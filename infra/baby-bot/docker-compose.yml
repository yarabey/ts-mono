# baby-bot production stack (single self-hosted server).
#
# CI copies this file + writes `.env` next to it, then runs:
#   docker compose pull && docker compose up -d
# All images are pulled from GHCR; nothing is built on the server.
#
# REGISTRY + IMAGE_TAG are appended to `.env` by the deploy workflow; the rest of
# `.env` comes from the BABY_BOT_ENV secret (see .env.example).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  # Daily logical backups of the Postgres DB (off-allowlist image; see ADR 0009).
  # Dumps `baby_bot` on SCHEDULE, gzips, and rotates daily/weekly/monthly under
  # ./backups (bind-mounted to /opt/baby-bot/backups on the host). The offsite
  # copy to the Finnish server is a host-cron job — see backup-offsite.sh.
  pg-backup:
    image: prodrigestivill/postgres-backup-local:17
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # `--clean --if-exists` makes each dump self-cleaning, so restore.sh can
      # load it straight into the existing DB without a manual schema drop.
      POSTGRES_EXTRA_OPTS: '--schema=public --clean --if-exists'
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/backups

  backend:
    image: ${REGISTRY}/baby-bot-backend:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - babybot-data:/app/data
    # Lets the container reach host-local services (e.g. a SOCKS5 proxy for
    # Telegram) via `host.docker.internal`. Set TELEGRAM_SOCKS5_PROXY to
    # host.docker.internal:<port> and bind the proxy on the host gateway iface.
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  web:
    image: ${REGISTRY}/baby-bot-web:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - backend
    ports:
      - '80:80' # ACME HTTP-01 challenge (Let's Encrypt)
      - '8443:8443' # app (HTTPS)
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  babybot-data:
  caddy_data:
  caddy_config:
