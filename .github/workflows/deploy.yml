name: Reusable deploy (build → GHCR → SSH compose)

# Product-agnostic deploy pipeline, shared by every ts-mono product.
# A product onboards by adding a tiny caller workflow that passes its images,
# infra dir, deploy path, and a `<PRODUCT>_ENV` secret. See infra/README.md.

on:
  workflow_call:
    inputs:
      product:
        description: Product name (for logs/onboarding clarity).
        required: true
        type: string
      registry:
        description: GHCR namespace images are pushed to.
        required: false
        type: string
        default: ghcr.io/yarabey/ts-mono
      image_tag:
        description: Tag applied to every built image (also tagged `latest`).
        required: true
        type: string
      infra_dir:
        description: Repo path holding docker-compose.yml (convention infra/<product>).
        required: true
        type: string
      deploy_path:
        description: Absolute dir on the server the stack runs from.
        required: true
        type: string
      images:
        description: 'JSON array: [{ "name", "dockerfile", "build_args" }].'
        required: true
        type: string
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: true
      SSH_PORT:
        required: false
      APP_ENV:
        description: The product's full production `.env` (REGISTRY/IMAGE_TAG appended here).
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJSON(inputs.images) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          build-args: ${{ matrix.image.build_args }}
          tags: |
            ${{ inputs.registry }}/${{ matrix.image.name }}:${{ inputs.image_tag }}
            ${{ inputs.registry }}/${{ matrix.image.name }}:latest
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    env:
      APP_ENV: ${{ secrets.APP_ENV }}
      DEPLOY_REGISTRY: ${{ inputs.registry }}
      DEPLOY_IMAGE_TAG: ${{ inputs.image_tag }}
      DEPLOY_PATH: ${{ inputs.deploy_path }}
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: ${{ inputs.infra_dir }}/docker-compose.yml
          target: ${{ inputs.deploy_path }}
          strip_components: 2 # drop the `infra/<product>/` prefix

      - name: Write .env, pull and (re)start the stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true # fail the job on any non-zero command
          envs: APP_ENV,DEPLOY_REGISTRY,DEPLOY_IMAGE_TAG,DEPLOY_PATH,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            umask 077
            # Assemble .env: the secret blob + CI-derived REGISTRY/IMAGE_TAG.
            printf '%s\n' "$APP_ENV" > .env
            printf 'REGISTRY=%s\n' "$DEPLOY_REGISTRY" >> .env
            printf 'IMAGE_TAG=%s\n' "$DEPLOY_IMAGE_TAG" >> .env
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker logout ghcr.io
